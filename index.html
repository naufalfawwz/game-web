<!DOCTYPE html>
<html>
<head>
<title>Game Klik</title>
<style>
body{
text-align:center;
font-family:Arial;
}
button{
font-size:25px;
padding:20px;
}
</style>
</head>

<body>

<h1>Game Klik</h1>
<p id="score">Score: 0</p>

<button onclick="klik()">Klik!</button>

<script>
let score = 0;

function klik(){
score++;
document.getElementById("score").innerText="Score: "+score;
}
</script>

</body>
</html>
