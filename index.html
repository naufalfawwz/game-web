<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Multiplayer 2 Player</title>
<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff;text-align:center;}
canvas{background:#111;display:block;margin:20px auto;border:3px solid #fff;}
#lobby,#waiting{display:none;}
button,input{padding:10px;margin:5px;font-size:16px;}
#joystick{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:120px;height:120px;}
#stick{width:50px;height:50px;background:#fff;border-radius:50%;position:absolute;top:35px;left:35px;opacity:0.7;}
</style>
</head>
<body>

<div id="lobby">
<h2>Snake Multiplayer 2 Player</h2>
<button id="createRoom">Create Room</button><br>
<input id="joinCode" placeholder="Room Code">
<button id="joinRoom">Join Room</button>
</div>

<div id="waiting">
<h2>Waiting for 2nd Player...</h2>
<p id="roomCodeText"></p>
<p id="playerCountText"></p>
</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>
<div id="joystick"><div id="stick"></div></div>

<script type="module">
import { db, ref, set, get, onValue } from "../firebase.js";

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const lobby = document.getElementById('lobby');
const waiting = document.getElementById('waiting');
const roomCodeText = document.getElementById('roomCodeText');
const playerCountText = document.getElementById('playerCountText');

const joystick = document.getElementById('joystick');
const stick = document.getElementById('stick');

let roomCode = '';
let playerKey = '';
let playerId = Math.random().toString(36).substr(2,5);

let snakes = {}; // state for all snakes
let gameInterval = null;

// Direction
let dir = 'right';
let touchDir = null;

function show(element){lobby.style.display='none';waiting.style.display='none';canvas.style.display='none';joystick.style.display='none';element.style.display='block';}

show(lobby);

// ===== ROOM CODE =====
function randomCode(){return Math.random().toString(36).substr(2,4).toUpperCase();}

// ===== CREATE ROOM =====
document.getElementById('createRoom').onclick = async () => {
  roomCode = randomCode();
  playerKey = 'player1';
  await set(ref(db,`rooms/${roomCode}/players/${playerKey}`),{id:playerId,x:50,y:50,dir:'right',segments:[{x:50,y:50}]});
  await set(ref(db,`rooms/${roomCode}/state`),'waiting');
  show(waiting);
  roomCodeText.innerText = `Room Code: ${roomCode}`;
  listenRoom();
}

// ===== JOIN ROOM =====
document.getElementById('joinRoom').onclick = async () => {
  roomCode = document.getElementById('joinCode').value.toUpperCase();
  const snap = await get(ref(db,`rooms/${roomCode}`));
  if(!snap.exists()){alert("Room not found"); return;}
  const players = snap.val().players||{};
  if(Object.keys(players).length>=2){alert("Room full"); return;}
  playerKey = Object.keys(players).length===0?'player1':'player2';
  const startX = playerKey==='player1'?50:350;
  const startY = playerKey==='player1'?50:350;
  await set(ref(db,`rooms/${roomCode}/players/${playerKey}`),{id:playerId,x:startX,y:startY,dir:playerKey==='player1'?'right':'left',segments:[{x:startX,y:startY}]});
  await set(ref(db,`rooms/${roomCode}/state`),'playing');
  show(waiting);
  roomCodeText.innerText = `Room Code: ${roomCode}`;
  listenRoom();
}

// ===== LISTEN ROOM =====
function listenRoom(){
  const playersRef = ref(db,`rooms/${roomCode}/players`);
  onValue(playersRef, snap=>{
    const players = snap.val();
    if(!players) return;
    snakes = players;
    playerCountText.innerText = `Players: ${Object.keys(players).length}/2`;
    if(Object.keys(players).length===2 && !gameInterval){
      waiting.style.display='none';
      canvas.style.display='block';
      joystick.style.display='block';
      startGame();
    }
  });
}

// ===== GAME =====
function startGame(){
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp') dir='up';
    if(e.key==='ArrowDown') dir='down';
    if(e.key==='ArrowLeft') dir='left';
    if(e.key==='ArrowRight') dir='right';
  });

  // TOUCH JOYSTICK
  let startX,startY;
  stick.addEventListener('touchstart',e=>{const t=e.touches[0]; startX=t.clientX; startY=t.clientY;});
  stick.addEventListener('touchmove',e=>{
    const t=e.touches[0];
    const dx=t.clientX-startX;
    const dy=t.clientY-startY;
    if(Math.abs(dx)>Math.abs(dy)){dir=dx>0?'right':'left';}else{dir=dy>0?'down':'up';}
  });

  gameInterval = setInterval(gameLoop,120);
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let key in snakes){
    let s = snakes[key];

    // hanya update direction untuk player sendiri
    if(key===playerKey) s.dir=dir;

    // update head
    const head = {x:s.segments[s.segments.length-1].x, y:s.segments[s.segments.length-1].y};
    if(s.dir==='up') head.y -=10;
    if(s.dir==='down') head.y +=10;
    if(s.dir==='left') head.x -=10;
    if(s.dir==='right') head.x +=10;

    s.segments.push(head);
    if(s.segments.length>10) s.segments.shift();

    // collision check
    if(head.x<0 || head.x>=400 || head.y<0 || head.y>=400){alert("Game Over!"); clearInterval(gameInterval); return;}
    for(let other of s.segments.slice(0,-1)){if(other.x===head.x && other.y===head.y){alert("Game Over!"); clearInterval(gameInterval); return;}}

    // draw snake
    ctx.fillStyle = key===playerKey?'lime':'red';
    s.segments.forEach(seg=>ctx.fillRect(seg.x,seg.y,10,10));

    // sync to Firebase
    set(ref(db,`rooms/${roomCode}/players/${key}`),s);
  }
}
</script>

</body>
</html>
